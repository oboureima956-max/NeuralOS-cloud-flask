<!DOCTYPE html><html>
<head>
    <title>NeuralOS Interface</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }
        h1 {
            color: #38bdf8;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            background: #22c55e;
            border: none;
            color: white;
            cursor: pointer;
        }
        #data {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head><body><h1>🧠 NeuralOS Dashboard</h1><button onclick="loadEEG()">Lire EEG</button>

<div id="data">Aucune donnée</div><script>
function loadEEG() {
    fetch('/eeg')
    .then(response => response.json())
    .then(data => {
        document.getElementById('data').innerText = data.join(', ');
    });
}
</script></body>
</html>
